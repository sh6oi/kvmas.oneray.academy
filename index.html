<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>حاسبة عوامل التعريض بالأشعة</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght=300;400;500;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Tajawal',sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0ea5e9);
    padding:30px;
}

.container{
    max-width:700px; /* تم تقليل العرض ليناسب الواجهة بدون المجسم */
    margin:auto;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:30px;
    padding:30px;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
    color:white;
}

h2{
    text-align:center;
    margin-bottom:25px;
    font-size:34px;
    font-weight:800;
}

.top-section{
    display:block; /* تم تحويله إلى كتل عادية لعدم الحاجة لتقسيم الأعمدة */
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-size:17px;
    font-weight:700;
}

select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    font-size:16px;
    outline:none;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    background:linear-gradient(90deg,#06b6d4,#2563eb);
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,.3);
}

.result{
    margin-top:25px;
    background:rgba(255,255,255,.12);
    border-radius:20px;
    padding:25px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    min-height:120px;
}

.footer{
    margin-top:30px;
    text-align:center;
}

.academy{
    color:#facc15;
    font-size:22px;
    font-weight:800;
    margin-bottom:10px;
}

.teacher{
    color:#7dd3fc;
    font-size:20px;
    font-weight:700;
}

.info-card{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
    margin-top:15px;
}

.card{
    background:rgba(255,255,255,.15);
    padding:15px 25px;
    border-radius:15px;
    min-width:180px;
}

.card span{
    display:block;
    font-size:28px;
    color:#fde68a;
    margin-top:5px;
}

</style>
</head>

<body>

<div class="container">

    <h2>📷 حاسبة عوامل التعريض بالأشعة</h2>

    <div class="top-section">

        <div>

            <label>اختر جزء الجسم:</label>

            <select id="bodyPart">
                <option value="Skull AP/PA">Skull AP/PA</option> 
                <option value="Skull Lateral">Skull Lateral</option>
                <option value="Cervical Spine AP">Cervical Spine AP</option>
                <option value="Cervical Spine Lateral">Cervical Spine Lateral</option>
                <option value="Chest PA">Chest PA</option>
                <option value="Chest Lateral">Chest Lateral</option>
                <option value="Shoulder AP">Shoulder AP</option>
                <option value="Humerus AP">Humerus AP</option>
                <option value="Elbow AP">Elbow AP</option>
                <option value="Forearm AP">Forearm AP</option>
                <option value="Wrist AP">Wrist AP</option>
                <option value="Hand AP">Hand AP</option>
                <option value="Thoracic Spine AP">Thoracic Spine AP</option>
                <option value="Thoracic Spine Lateral">Thoracic Spine Lateral</option>
                <option value="Abdomen AP">Abdomen AP</option>
                <option value="Pelvis AP">Pelvis AP</option>
                <option value="Hip AP">Hip AP</option>
                <option value="Lumbar Spine AP">Lumbar Spine AP</option>
                <option value="Lumbar Spine Lateral">Lumbar Spine Lateral</option>
                <option value="Sacrum AP">Sacrum AP</option>
                <option value="Coccyx AP">Coccyx AP</option>
                <option value="Femur AP">Femur AP</option>
                <option value="Knee AP">Knee AP</option>
                <option value="Tibia/Fibula AP">Tibia/Fibula AP</option>
                <option value="Ankle AP">Ankle AP</option>
                <option value="Foot AP">Foot AP</option>
            </select>

            <label>نوع الجهاز:</label>

            <select id="device">
                <option value="CR">CR</option>
                <option value="DR">DR</option>
            </select>

            <label>بنية المريض:</label>

            <select id="patient">
                <option value="thin">نحيف</option>
                <option value="normal">متوسط</option>
                <option value="fat">سمين</option>
            </select>

            <button onclick="calculate()">
                احسب عوامل التعريض
            </button>

        </div>

    </div>

    <div class="result" id="result">
        اختر الفحص ثم اضغط على زر الحساب
    </div>

    <div class="footer">
        <div class="academy">
            تم تصميم هذا الموقع من قبل أكاديمية ONERAY
        </div>

        <div class="teacher">
            التدريسي: مجتبى كريم
        </div>
    </div>

</div>

<script>

const exposureData = {

CR: {
"Skull AP/PA": {kv:75, mas:16},
"Skull Lateral": {kv:70, mas:12},
"Cervical Spine AP": {kv:75, mas:12},
"Cervical Spine Lateral": {kv:80, mas:20},
"Chest PA": {kv:120, mas:3},
"Chest Lateral": {kv:120, mas:8},
"Shoulder AP": {kv:70, mas:10},
"Humerus AP": {kv:65, mas:8},
"Elbow AP": {kv:60, mas:5},
"Forearm AP": {kv:60, mas:4},
"Wrist AP": {kv:55, mas:3},
"Hand AP": {kv:55, mas:2},
"Thoracic Spine AP": {kv:80, mas:20},
"Thoracic Spine Lateral": {kv:90, mas:50},
"Abdomen AP": {kv:80, mas:32},
"Pelvis AP": {kv:80, mas:25},
"Hip AP": {kv:80, mas:25},
"Lumbar Spine AP": {kv:80, mas:32},
"Lumbar Spine Lateral": {kv:90, mas:63},
"Sacrum AP": {kv:80, mas:25},
"Coccyx AP": {kv:75, mas:16},
"Femur AP": {kv:75, mas:16},
"Knee AP": {kv:65, mas:8},
"Tibia/Fibula AP": {kv:65, mas:6},
"Ankle AP": {kv:60, mas:4},
"Foot AP": {kv:55, mas:3}
},

DR: {
"Skull AP/PA": {kv:75, mas:10},
"Skull Lateral": {kv:70, mas:8},
"Cervical Spine AP": {kv:75, mas:8},
"Cervical Spine Lateral": {kv:80, mas:12},
"Chest PA": {kv:120, mas:1.5},
"Chest Lateral": {kv:120, mas:4},
"Shoulder AP": {kv:70, mas:6},
"Humerus AP": {kv:65, mas:5},
"Elbow AP": {kv:60, mas:3},
"Forearm AP": {kv:60, mas:2.5},
"Wrist AP": {kv:55, mas:2},
"Hand AP": {kv:55, mas:1},
"Thoracic Spine AP": {kv:80, mas:12},
"Thoracic Spine Lateral": {kv:90, mas:32},
"Abdomen AP": {kv:80, mas:20},
"Pelvis AP": {kv:80, mas:16},
"Hip AP": {kv:80, mas:16},
"Lumbar Spine AP": {kv:80, mas:20},
"Lumbar Spine Lateral": {kv:90, mas:40},
"Sacrum AP": {kv:80, mas:16},
"Coccyx AP": {kv:75, mas:10},
"Femur AP": {kv:75, mas:10},
"Knee AP": {kv:65, mas:5},
"Tibia/Fibula AP": {kv:65, mas:4},
"Ankle AP": {kv:60, mas:3},
"Foot AP": {kv:55, mas:2}
}
};

function calculate(){

    const bodyPart =
    document.getElementById("bodyPart").value;

    const device =
    document.getElementById("device").value;

    const patient =
    document.getElementById("patient").value;

    let kv =
    exposureData[device][bodyPart].kv;

    let mas =
    exposureData[device][bodyPart].mas;

    if(patient === "thin"){
        mas *= 0.75;
    }

    else if(patient === "fat"){
        mas *= 1.25;
    }

    document.getElementById("result").innerHTML = `

        <h3>📷 عوامل التعريض المقترحة</h3>

        <div class="info-card">

            <div class="card">
                kV
                <span>${kv}</span>
            </div>

            <div class="card">
                mAs
                <span>${mas.toFixed(2)}</span>
            </div>

        </div>

    `;
}

</script>

</body>
</html>
